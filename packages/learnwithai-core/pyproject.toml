[project]
name = "learnwithai-core"
version = "0.1.0"
description = "Shared core domain and business logic for LearnWithAI"
requires-python = ">=3.12"
dependencies = [
  "psycopg[binary]>=3.3.3,<4",
  "pydantic>=2.8,<3",
  "pydantic-settings>=2.13.1,<3",
  "sqlmodel>=0.0.37,<0.1.0",
]

[dependency-groups]
dev = [
  "pytest>=8.3,<10",
  "pytest-cov>=6.0,<7",
  "ruff>=0.11,<0.16",
  "pyright>=1.1.400,<2",
]

[tool.uv.build-backend]
module-name = "learnwithai"

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"
