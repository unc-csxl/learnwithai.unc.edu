[project]
name = "learnwithai-core"
version = "0.1.0"
description = "Shared core domain and business logic for LearnWithAI"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.8,<3",
]

[dependency-groups]
dev = [
  "pytest>=8.3,<9",
  "ruff>=0.11,<0.12",
  "pyright>=1.1.400,<2",
]

[tool.uv.build-backend]
module-name = "learnwithai"

[build-system]
requires = ["uv_build>=0.8.0,<0.9.0"]
build-backend = "uv_build"