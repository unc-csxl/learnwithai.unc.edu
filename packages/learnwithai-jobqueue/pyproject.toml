[project]
name = "learnwithai-jobqueue"
version = "0.1.0"
description = "Shared Dramatiq queue integration for LearnWithAI"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "dramatiq[rabbitmq]>=2.1,<3",
  "learnwithai-core",
]

[tool.uv.sources]
learnwithai-core = { workspace = true }

[dependency-groups]
dev = [
  "pytest>=8.3,<9",
  "ruff>=0.11,<0.12",
  "pyright>=1.1.400,<2",
]

[tool.uv.build-backend]
module-name = "learnwithai_jobqueue"

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"