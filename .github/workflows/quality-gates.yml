name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  qa:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/learnwithai_test
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/learnwithai_test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: learnwithai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d learnwithai_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Python dependencies
        run: uv sync --all-packages --all-groups

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run repository QA checks
        run: ./scripts/qa.sh --check