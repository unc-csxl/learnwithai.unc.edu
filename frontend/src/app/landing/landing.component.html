<div class="landing-container mat-bg-surface-container">
  <mat-card class="landing-card">
    <mat-card-content>
      <div class="brand">
        <span class="brand-learn">LEARN</span>
        <span class="brand-line-two">
          <span class="brand-with">with</span>
          <span class="brand-ai">AI</span>
        </span>
      </div>
      <div class="actions">
        <button mat-flat-button (click)="auth.login()">
          <mat-icon>login</mat-icon>
          Login via UNC Onyen
        </button>
        @if (isDev && devUsers().length > 0) {
          <button mat-stroked-button [matMenuTriggerFor]="devMenu" aria-label="Developer login">
            <mat-icon>developer_mode</mat-icon>
            Dev Login
          </button>
          <mat-menu #devMenu="matMenu">
            @for (user of devUsers(); track user.pid) {
              <button mat-menu-item (click)="devLoginAs(user)">
                {{ user.name }} ({{ user.pid }})
              </button>
            }
          </mat-menu>
        }
      </div>
    </mat-card-content>
  </mat-card>
  <footer class="landing-footer">
    &copy; {{ currentYear }} UNC Computer Science Experience Labs &mdash;
    <a href="https://csxl.unc.edu" target="_blank" rel="noopener noreferrer">csxl.unc.edu</a>
  </footer>
</div>
