<div class="landing-container mat-bg-surface-container">
  <mat-pane class="w-sm">
    <mat-card-content class="flex h-48 flex-col">
      <div class="flex-between flex h-full flex-col">
        <div class="brand-lockup">
          <div class="brand-text">
            <span class="brand-learn">LEARN</span>
            <span class="brand-line-two">
              <span class="brand-with">with</span>
              <span class="brand-ai">AI</span>
            </span>
          </div>
          <img
            [ngSrc]="logoAsset()"
            alt="UNC Chapel Hill"
            width="48"
            height="38"
            class="brand-logo"
          />
        </div>
        @if (isDev && devUsers().length > 0) {
          <div class="mt-auto flex w-full flex-row gap-2">
            <button mat-stroked-button [matMenuTriggerFor]="devMenu" aria-label="Developer login">
              <mat-icon>developer_mode</mat-icon>
              Dev Login
            </button>
            <mat-menu #devMenu="matMenu">
              @for (user of devUsers(); track user.pid) {
                <button mat-menu-item (click)="devLoginAs(user)">
                  {{ user.name }} ({{ user.pid }})
                </button>
              }
            </mat-menu>
            <button mat-flat-button (click)="auth.login()" class="flex-1">
              <mat-icon>login</mat-icon>
              Login via UNC Onyen
            </button>
          </div>
        } @else {
          <div class="mt-auto w-full">
            <button mat-flat-button (click)="auth.login()" class="w-full">
              <mat-icon>login</mat-icon>
              Login via UNC Onyen
            </button>
          </div>
        }
      </div>
    </mat-card-content>
  </mat-pane>
</div>
