@if (errorMessage()) {
  <p role="alert">{{ errorMessage() }}</p>
} @else if (roster().length > 0) {
  <div class="flex justify-end mb-4">
    <a mat-flat-button routerLink="../add-member">
      <mat-icon>person_add</mat-icon>
      Add Member
    </a>
  </div>
  <table mat-table [dataSource]="dataSource()" aria-label="Course roster">
    <ng-container matColumnDef="user_pid">
      <th mat-header-cell *matHeaderCellDef>PID</th>
      <td mat-cell *matCellDef="let member">{{ member.user_pid }}</td>
    </ng-container>
    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef>Role</th>
      <td mat-cell *matCellDef="let member">{{ member.type }}</td>
    </ng-container>
    <ng-container matColumnDef="state">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let member">{{ member.state }}</td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
} @else if (loaded()) {
  <p>No members found for this course.</p>
}
