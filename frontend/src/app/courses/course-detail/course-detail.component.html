@if (errorMessage()) {
  <p role="alert">{{ errorMessage() }}</p>
} @else if (course(); as c) {
  <p class="text-sm opacity-75 mb-2">{{ c.term }} &mdash; Section {{ c.section }}</p>
  <nav mat-tab-nav-bar [tabPanel]="tabPanel" aria-label="Course navigation">
    <a
      mat-tab-link
      routerLink="roster"
      routerLinkActive
      #rlaRoster="routerLinkActive"
      [active]="rlaRoster.isActive"
    >
      Roster
    </a>
    <a
      mat-tab-link
      routerLink="activities"
      routerLinkActive
      #rlaActivities="routerLinkActive"
      [active]="rlaActivities.isActive"
    >
      Activities
    </a>
    <a
      mat-tab-link
      routerLink="tools"
      routerLinkActive
      #rlaTools="routerLinkActive"
      [active]="rlaTools.isActive"
    >
      Tools
    </a>
  </nav>
  <mat-tab-nav-panel #tabPanel>
    <router-outlet />
  </mat-tab-nav-panel>
}
