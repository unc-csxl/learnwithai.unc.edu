@if (errorMessage()) {
  <p class="text-red-600" role="alert">{{ errorMessage() }}</p>
} @else if (loaded()) {
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4 max-w-md">
    <app-course-form-fields [formGroup]="form" />
    <button mat-flat-button type="submit" [disabled]="form.invalid || saving()">
      @if (saving()) {
        Saving…
      } @else {
        Save
      }
    </button>
    @if (saved()) {
      <p class="text-sm text-green-600" role="status">Course settings updated.</p>
    }
  </form>
}
