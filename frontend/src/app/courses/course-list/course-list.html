<main>
  <header>
    <h1>My Courses</h1>
    <a routerLink="/courses/create" role="button">Create Course</a>
  </header>
  @if (courses().length > 0) {
    <ul>
      @for (course of courses(); track course.id) {
        <li>
          <a [routerLink]="['/courses', course.id]">
            {{ course.name }} — {{ course.term }} ({{ course.section }})
          </a>
        </li>
      }
    </ul>
  } @else if (loaded()) {
    <p>You are not enrolled in any courses.</p>
  }
</main>
