<div class="flex max-w-md flex-col gap-6">
  <section aria-label="Account information">
    <dl class="flex flex-col gap-2">
      <div class="flex items-baseline gap-3">
        <dt class="w-20 shrink-0 text-sm text-[var(--mat-sys-on-surface-variant)]">PID</dt>
        <dd class="m-0 text-sm font-medium">{{ user()?.pid }}</dd>
      </div>
      <div class="flex items-baseline gap-3">
        <dt class="w-20 shrink-0 text-sm text-[var(--mat-sys-on-surface-variant)]">Onyen</dt>
        <dd class="m-0 text-sm font-medium">{{ user()?.onyen }}</dd>
      </div>
      <div class="flex items-baseline gap-3">
        <dt class="w-20 shrink-0 text-sm text-[var(--mat-sys-on-surface-variant)]">Email</dt>
        <dd class="m-0 text-sm font-medium">{{ user()?.email }}</dd>
      </div>
      <div class="flex items-baseline gap-3">
        <dt class="w-20 shrink-0 text-sm text-[var(--mat-sys-on-surface-variant)]">Name</dt>
        <dd class="m-0 text-sm font-medium">{{ user()?.name }}</dd>
      </div>
    </dl>
  </section>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
    <mat-form-field>
      <mat-label>Given Name</mat-label>
      <input matInput formControlName="given_name" type="text" />
    </mat-form-field>
    <mat-form-field>
      <mat-label>Family Name</mat-label>
      <input matInput formControlName="family_name" type="text" />
    </mat-form-field>
    @if (errorMessage()) {
      <p class="text-sm text-red-600" role="alert">{{ errorMessage() }}</p>
    }
    <button mat-flat-button type="submit" [disabled]="form.invalid || saving()">
      @if (saving()) {
        Saving…
      } @else {
        Save
      }
    </button>
  </form>
</div>
