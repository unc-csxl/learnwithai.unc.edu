<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4 max-w-md">
  <mat-form-field>
    <mat-label>PID</mat-label>
    <input matInput [value]="user()?.pid" readonly />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Onyen</mat-label>
    <input matInput [value]="user()?.onyen" readonly />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Email</mat-label>
    <input matInput [value]="user()?.email" readonly />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Full Name</mat-label>
    <input matInput [value]="fullName()" readonly />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Given Name</mat-label>
    <input matInput formControlName="given_name" type="text" />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Family Name</mat-label>
    <input matInput formControlName="family_name" type="text" />
  </mat-form-field>
  <button mat-flat-button type="submit" [disabled]="form.invalid || saving()">
    @if (saving()) {
      Saving…
    } @else {
      Save
    }
  </button>
  @if (saved()) {
    <p class="text-sm text-green-600" role="status">Profile updated.</p>
  }
</form>
