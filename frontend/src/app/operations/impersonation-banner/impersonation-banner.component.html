<div class="impersonation-banner" role="alert">
  <mat-icon>warning</mat-icon>
  <span class="impersonation-message">
    Viewing as <strong>{{ auth.user()?.name }}</strong> ({{ auth.user()?.pid }})
  </span>
  <button mat-raised-button color="warn" (click)="exitImpersonation()">Exit Impersonation</button>
</div>
