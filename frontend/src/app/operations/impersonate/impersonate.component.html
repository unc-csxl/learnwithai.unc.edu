<div class="impersonate-page">
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search by name, PID, or email</mat-label>
    <input matInput [formControl]="searchControl" autocomplete="off" />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  @if (searching()) {
    <mat-spinner diameter="32"></mat-spinner>
  } @else if (results().length > 0) {
    <table mat-table [dataSource]="results()" class="results-table">
      <ng-container matColumnDef="pid">
        <th mat-header-cell *matHeaderCellDef>PID</th>
        <td mat-cell *matCellDef="let user">{{ user.pid }}</td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let user">{{ user.name }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let user">{{ user.email }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let user">
          <button mat-raised-button (click)="onImpersonate(user)">
            <mat-icon>swap_horiz</mat-icon>
            Impersonate
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  } @else if (hasSearched()) {
    <p class="no-results">No users found.</p>
  }
</div>
