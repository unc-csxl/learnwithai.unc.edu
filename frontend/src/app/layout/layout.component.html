<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #drawer
    [mode]="sidenavMode()"
    [opened]="sidenavOpened()"
    [attr.role]="'navigation'"
    [class.sidenav-mobile]="isHandset()"
    class="sidenav"
  >
    <div class="sidenav-brand-wrap">
      <a class="sidenav-brand" routerLink="/courses" aria-label="Learn with AI home">
        <span class="brand-learn">LEARN</span>
        <span class="brand-line-two">
          <span class="brand-with">with</span>
          <span class="brand-ai">AI</span>
        </span>
      </a>
      @if (isHandset()) {
        <button
          mat-icon-button
          class="sidenav-close"
          aria-label="Close navigation"
          (click)="toggleDrawer()"
        >
          <mat-icon>close</mat-icon>
        </button>
      }
    </div>
    <mat-nav-list>
      <a
        mat-list-item
        routerLink="/courses"
        routerLinkActive="active-link"
        (click)="closeMobileSidenav()"
      >
        <mat-icon matListItemIcon>school</mat-icon>
        <span matListItemTitle>Courses</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="app-toolbar">
      @if (isHandset()) {
        <button mat-icon-button aria-label="Toggle navigation" (click)="toggleDrawer()">
          <mat-icon>menu</mat-icon>
        </button>
      }
      <span class="toolbar-title">{{ pageTitle.title() }}</span>
      <span class="spacer"></span>
      <button
        mat-icon-button
        [attr.aria-label]="themeTooltip()"
        [matTooltip]="themeTooltip()"
        (click)="theme.toggle()"
      >
        <mat-icon>{{ themeIcon() }}</mat-icon>
      </button>
      @if (auth.isAuthenticated()) {
        <button mat-button (click)="auth.logout()">Logout</button>
      } @else {
        <button mat-button (click)="auth.login()">Login</button>
      }
    </mat-toolbar>
    <main class="content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
