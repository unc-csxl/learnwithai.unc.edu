services:
  dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/learnwithai:cached
      - learnwithai-uv-cache:/home/vscode/.cache/uv
      - learnwithai-npm-cache:/home/vscode/.npm
    working_dir: /workspaces/learnwithai
    command: sleep infinity
    environment:
      PYTHONUNBUFFERED: "1"
      UV_LINK_MODE: copy
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/learnwithai
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: learnwithai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - learnwithai-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d learnwithai"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  learnwithai-postgres-data:
  learnwithai-uv-cache:
  learnwithai-npm-cache: