# =============================================================================
# BuildConfig — builds the app image from a binary source archive
# =============================================================================
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: learnwithai-app
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: learnwithai
    app.kubernetes.io/component: app
spec:
  source:
    type: Binary
    binary: {}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: infra/Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: learnwithai-app:latest

---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: learnwithai-app
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: learnwithai
    app.kubernetes.io/component: app

---
# =============================================================================
# Deployment — the main application pod (FastAPI + static files)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: learnwithai-app
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: learnwithai
    app.kubernetes.io/component: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: learnwithai-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: learnwithai-app
        app.kubernetes.io/part-of: learnwithai
        app.kubernetes.io/component: app
    spec:
      containers:
        - name: app
          image: image-registry.openshift-image-registry.svc:5000/${NAMESPACE}/learnwithai-app:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: learnwithai-secrets
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: STATIC_DIR
              value: "/app/static"
            - name: LOG_LEVEL
              value: "INFO"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              memory: 96Mi
              cpu: 60m
            limits:
              memory: 192Mi
              cpu: 150m

---
apiVersion: v1
kind: Service
metadata:
  name: learnwithai-app
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: learnwithai
    app.kubernetes.io/component: app
spec:
  selector:
    app.kubernetes.io/name: learnwithai-app
  ports:
    - port: 8000
      targetPort: 8000
