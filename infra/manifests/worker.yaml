apiVersion: apps/v1
kind: Deployment
metadata:
  name: learnwithai-worker
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: learnwithai
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: learnwithai-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: learnwithai-worker
        app.kubernetes.io/part-of: learnwithai
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: learnwithai-app:latest
          command:
            - uv
            - run
            - --no-dev
            - dramatiq
            - learnwithai_jobqueue.worker
          envFrom:
            - secretRef:
                name: learnwithai-secrets
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
