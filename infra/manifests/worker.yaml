apiVersion: apps/v1
kind: Deployment
metadata:
  name: learnwithai-worker
  namespace: ${NAMESPACE}
  annotations:
    image.openshift.io/triggers: >-
      [{"from":{"kind":"ImageStreamTag","name":"learnwithai-app:latest","namespace":"${NAMESPACE}"},"fieldPath":"spec.template.spec.containers[?(@.name==\"worker\")].image"}]
  labels:
    app.kubernetes.io/part-of: learnwithai
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: learnwithai-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: learnwithai-worker
        app.kubernetes.io/part-of: learnwithai
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: learnwithai-app:latest
          command:
            - /app/.venv/bin/dramatiq
            - learnwithai_jobqueue.worker
          envFrom:
            - secretRef:
                name: learnwithai-secrets
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              memory: 128Mi
              cpu: 60m
            limits:
              memory: 256Mi
              cpu: 150m
