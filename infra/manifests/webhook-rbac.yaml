apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: learnwithai-webhook-access
  namespace: ${NAMESPACE}
  annotations:
    rbac.authorization.kubernetes.io/autoupdate: "true"
  labels:
    app.kubernetes.io/part-of: learnwithai
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:webhook
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:unauthenticated