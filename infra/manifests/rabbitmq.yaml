apiVersion: apps/v1
kind: Deployment
metadata:
  name: learnwithai-rabbitmq
  namespace: learnwithai
  labels:
    app.kubernetes.io/part-of: learnwithai
    app.kubernetes.io/component: messaging
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: learnwithai-rabbitmq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: learnwithai-rabbitmq
        app.kubernetes.io/part-of: learnwithai
        app.kubernetes.io/component: messaging
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - containerPort: 5672
            - containerPort: 15672
          envFrom:
            - secretRef:
                name: learnwithai-rabbitmq-credentials
          readinessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - check_port_connectivity
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - check_port_connectivity
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m

---
apiVersion: v1
kind: Service
metadata:
  name: learnwithai-rabbitmq
  namespace: learnwithai
  labels:
    app.kubernetes.io/part-of: learnwithai
    app.kubernetes.io/component: messaging
spec:
  selector:
    app.kubernetes.io/name: learnwithai-rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
