# =============================================================================
# secrets.yaml — TEMPLATE — Fill in real values before applying
# =============================================================================
# This file is a template. Replace every <PLACEHOLDER> with a real value.
# Once filled in, apply with: oc apply -f secrets.yaml
#
# IMPORTANT: Never commit this file with real secrets to version control.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: learnwithai-secrets
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: learnwithai
type: Opaque
stringData:
  # PostgreSQL connection string.
  # Format: postgresql+psycopg://<user>:<password>@learnwithai-postgres:5432/learnwithai
  DATABASE_URL: "postgresql+psycopg://learnwithai:<DB_PASSWORD>@learnwithai-postgres:5432/learnwithai"

  # RabbitMQ connection string.
  # Format: amqp://<user>:<password>@learnwithai-rabbitmq:5672/
  RABBITMQ_URL: "amqp://learnwithai:<RABBITMQ_PASSWORD>@learnwithai-rabbitmq:5672/"

  # JWT signing secret. Generate with: python3 -c "import secrets; print(secrets.token_urlsafe(48))"
  JWT_SECRET: "<GENERATE_A_STRONG_SECRET>"

  # The public hostname that the frontend is served from (no https:// prefix).
  # Example: learnwithai.apps.cloud.unc.edu
  HOST: "<PUBLIC_HOSTNAME>"

  # The private OpenAI API Key
  OPENAI_API_KEY: "<SECRET_API_KEY>"

---
# PostgreSQL credentials — referenced by the postgres Deployment
apiVersion: v1
kind: Secret
metadata:
  name: learnwithai-postgres-credentials
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: learnwithai
type: Opaque
stringData:
  POSTGRESQL_USER: "learnwithai"
  POSTGRESQL_PASSWORD: "<DB_PASSWORD>"
  POSTGRESQL_DATABASE: "learnwithai"

---
# RabbitMQ credentials — referenced by the rabbitmq Deployment
apiVersion: v1
kind: Secret
metadata:
  name: learnwithai-rabbitmq-credentials
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: learnwithai
type: Opaque
stringData:
  RABBITMQ_DEFAULT_USER: "learnwithai"
  RABBITMQ_DEFAULT_PASS: "<RABBITMQ_PASSWORD>"
